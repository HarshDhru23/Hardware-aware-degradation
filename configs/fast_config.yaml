# Fast processing configuration for testing/debugging
# Minimal degradation for quick experimentation

# Core pipeline parameters
downsampling_factor: 4

# Minimal blur
optical_sigma: 0.5      # Light blur
optical_kernel_size: 3  # Small kernel

# Minimal motion blur
motion_kernel_size: 1   # No motion blur

# Light noise
enable_gaussian: true
enable_poisson: false   # Disable Poisson for speed
gaussian_mean: 0.0
gaussian_std: 3.0       # Light noise
poisson_lambda: 1.0

# Data parameters
normalize: true
target_dtype: "float32"

# Small patches for fast processing
hr_patch_size: 128
lr_patch_size: 32
patch_stride: 128       # No overlap
min_valid_pixels: 0.9   # Relaxed quality requirement

# Output parameters
input_format: "geotiff"
output_format: "npy"
save_visualization: false  # Skip visualization for speed

# Logging
log_level: "WARNING"
verbose: false