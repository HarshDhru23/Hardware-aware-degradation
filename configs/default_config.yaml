# Default configuration for Hardware-aware Degradation Pipeline
# ISRO Multi-Frame Super-Resolution (MFSR) Project

# Core pipeline parameters
downsampling_factor: 2  # 2x super-resolution factor (range: 2-8)
downsampling_mode: 2   # Mode for LR frame generation: 2 or 4
                       # Mode 2: Generate 2 LR frames [(0,0), (0.5,0.5)]
                       # Mode 4: Generate 4 LR frames [(0,0), (0.25,0.25), (0.5,0.5), (0.75,0.75)]

# Multi-frame configuration - automatically set by downsampling_mode
# num_lr_frames and shift_values are determined by downsampling_mode
shift_mode: 'deterministic'  # 'deterministic' or 'stochastic'

# Anisotropic Gaussian PSF blur parameters
# Models satellite sensor PSF as anisotropic 2D Gaussian
psf_sigma_x: 0.8       # Horizontal PSF sigma (range: 0.5-2.0)
psf_sigma_y: 1.0       # Vertical PSF sigma (range: 0.5-2.0)
psf_theta: 0.0         # PSF orientation angle in degrees (0-180)
psf_kernel_size: 9     # Gaussian kernel size, must be odd (range: 3-15)
                       

# Noise parameters
enable_gaussian: true  # Enable Gaussian noise (read noise from electronics)
enable_poisson: true   # Enable Poisson noise (photon shot noise - RECOMMENDED)
gaussian_mean: 0.0     # Gaussian noise mean (range: -10.0 to 10.0)
gaussian_std: 0.0005   # Gaussian noise std dev - read noise (range: 0.0001-0.1)
                       # For normalized [0,1]: 0.0001-0.001 typical, 0.001-0.01 high noise
poisson_lambda: 1.0    # Poisson noise scaling factor (range: 0.1-5.0) [DEPRECATED - use photon_gain]
photon_gain: 30000.0    # Photon gain factor for sensor (fixed: 20k-40k, using 30k)
                       # Formula: photon_gain = normalizing_number * random_sensor_factor
                       # Where normalizing_number = 2047 (11-bit) and sensor_factor = 10-20

# Quantization parameters (ADC simulation)
enable_quantization: true  # Enable ADC quantization to match real sensor
quantization_bits: 11      # Bit depth (11-bit for WorldView-3, range: 8-16)
                           # 11-bit = 2048 levels (0-2047)

# Data loading parameters
normalize: true        # Normalize pixel values to [0, 1]
target_dtype: "float32"  # Target data type: float32, float64, uint8, uint16

# Patch extraction parameters
hr_patch_size: 256     # HR patch size (range: 64-1024)
lr_patch_size: 128     # LR patch size (range: 16-256) - must be hr_patch_size/downsampling_factor
patch_stride: 256      # Stride for patch extraction (default: hr_patch_size)
min_valid_pixels: 0.95 # Minimum fraction of valid pixels in patch (range: 0.5-1.0)

# File I/O parameters
input_format: "tiff"  # Input format: geotiff, tiff, png
output_format: "npy"     # Output format: npy, png, tiff
save_visualization: true # Save visualization plots

# Logging
log_level: "INFO"      # Logging level: DEBUG, INFO, WARNING, ERROR
verbose: true          # Verbose output